<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>翰林学府 | 官方联考中心</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        body {
            background-color: #0f172a;
            color: #f1f5f9;
            min-height: 100vh;
            padding: 16px;
        }
        .header {
            text-align: center;
            padding: 12px 0;
            font-size: 18px;
            font-weight: 500;
            color: #cbd5e1;
            margin-bottom: 20px;
        }
        .card {
            background-color: #1e293b;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .card-title {
            display: flex;
            align-items: center;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #f1f5f9;
        }
        .card-title::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 24px;
            background-color: #3b82f6;
            margin-right: 12px;
            border-radius: 2px;
        }
        .card-desc {
            color: #94a3b8;
            font-size: 16px;
            margin-bottom: 20px;
            line-height: 1.5;
        }
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.2s ease;
            margin-bottom: 16px;
        }
        .btn-primary {
            background-color: #2563eb;
            color: #ffffff;
            box-shadow: 0 0 20px rgba(37, 99, 235, 0.4);
        }
        .btn-primary:hover {
            background-color: #1d4ed8;
            box-shadow: 0 0 25px rgba(37, 99, 235, 0.6);
        }
        .btn-secondary {
            background-color: #334155;
            color: #cbd5e1;
            border: 1px solid #475569;
        }
        .btn-secondary:hover {
            background-color: #475569;
        }
        .btn-outline {
            background-color: transparent;
            color: #3b82f6;
            border: 1px solid #3b82f6;
        }
        .btn-outline:hover {
            background-color: rgba(59, 130, 246, 0.1);
        }
        .btn-icon {
            margin-right: 8px;
            font-size: 20px;
        }
        .btn-arrow {
            margin-left: auto;
            font-size: 18px;
        }
        .official-badge {
            text-align: center;
            color: #fbbf24;
            font-size: 16px;
            font-weight: 500;
            margin-top: 12px;
        }
        .warning-box {
            background-color: rgba(234, 179, 8, 0.1);
            border-left: 4px solid #eab308;
            padding: 16px;
            border-radius: 8px;
            color: #fde047;
            font-size: 16px;
            line-height: 1.6;
        }
        .footer {
            text-align: center;
            color: #64748b;
            font-size: 14px;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="header">
        翰林学府 | 官方联考中心
    </div>

    <div class="card">
        <div class="card-title">官方客服 & 咨询</div>
        <div class="card-desc">
            点击下方按钮获取最新考务安排及帮助。
        </div>
        <a href="https://docs.qq.com/doc/DQU9zZW9nTnNJSEVY" target="_blank" class="btn btn-primary">
            <span class="btn-icon">🤖</span>
            点击联系人工客服（VIP专属通道）
        </a>
        <div class="official-badge">
            ★ 翰林学府 · 官方认证 ★
        </div>
    </div>

    <div class="card">
        <div class="card-title">考试日程 & 历史验证</div>
        <div class="card-desc">
            请点击下方链接查阅相关文档：
        </div>
        <a href="https://docs.qq.com/doc/DQXBoY2JwSkhxY1ZO" target="_blank" class="btn btn-secondary">
            <span class="btn-icon">📅</span>
            全国考试时间表 + 历史验证
            <span class="btn-arrow">→</span>
        </a>
        <a href="https://docs.qq.com/doc/DQW5vYnRQd3BkVHFO" target="_blank" class="btn btn-outline">
            <span class="btn-icon">❄️</span>
            翰林学府售后通道
            <span class="btn-arrow">→</span>
        </a>
    </div>

    <div class="card">
        <div class="card-title" style="color: #f87171;">
            重要安全须知
        </div>
        <div class="card-desc"></div>
        <a href="https://docs.qq.com/doc/DQW5MVE9ZWUNhaHFV" target="_blank" class="btn btn-secondary" style="border-left: 4px solid #ef4444;">
            <span class="btn-icon">🛡️</span>
            [必读] 考前安全文档
            <span class="btn-arrow">→</span>
        </a>
        <div class="warning-box">
            ⚠️ 防骗警示：<br>
            群内主动添加您的均为诈骗人员！请认准翰林学府唯一官方客服，谨防上当受骗。完整解析请进VIP群查看。
        </div>
    </div>

    <div class="footer">
        © 2024 翰林学府. All Rights Reserved.
    </div>
</body>
</html>
