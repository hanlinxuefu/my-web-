<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>翰林学府 | 官方联考中心</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* 头部 Logo */
        .header {
            text-align: center;
            padding: 30px 0;
        }

        .header h1 {
            font-size: 36px;
            font-weight: bold;
            background: linear-gradient(90deg, #3b82f6, #2563eb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .header p {
            color: #94a3b8;
            font-size: 16px;
        }

        /* 模块卡片 */
        .card {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .card-title {
            display: flex;
            align-items: center;
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #f1f5f9;
        }

        .card-title::before {
            content: '';
            width: 4px;
            height: 24px;
            background: #3b82f6;
            border-radius: 2px;
            margin-right: 12px;
        }

        .card-subtitle {
            color: #94a3b8;
            font-size: 15px;
            margin-bottom: 20px;
        }

        /* 按钮样式 */
        .btn-primary {
            display: block;
            width: 100%;
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            color: white;
            text-align: center;
            padding: 16px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 17px;
            font-weight: 500;
            transition: all 0.3s ease;
            box-shadow: 0 4px 16px rgba(37, 99, 235, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(37, 99, 235, 0.4);
        }

        /* 页脚 */
        .footer {
            text-align: center;
            color: #64748b;
            font-size: 14px;
            padding: 30px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <h1>翰林解析网</h1>
            <p>全国联考认准翰林</p>
        </div>

        <!-- 翰林学府官方客服 -->
        <div class="card">
            <div class="card-title">翰林学府官方客服</div>
            <div class="card-subtitle">点击下方按钮获取最新考务安排及帮助。</div>
            <a href="https://docs.qq.com/doc/DQU9zZW9nTnNJSEVY#" class="btn-primary" target="_blank">
                🤖 点击联系人工客服（VIP专属通道）
            </a>
            <div style="text-align: center; margin-top: 12px; color: #eab308; font-weight: 500;">
                ★ 翰林学府 · 官方认证 ★
            </div>
        </div>

        <!-- 翰林学府往期考试认证 -->
        <div class="card">
            <div class="card-title">翰林学府往期考试认证</div>
            <div class="card-subtitle">请点击下方链接查阅相关文档：</div>
            <a href="https://docs.qq.com/doc/DQXBoY2JwSkhxY1ZO" class="btn-primary" target="_blank">
                📅 翰林学府往期考试认证
            </a>
        </div>

        <!-- 翰林学府上车必看 -->
        <div class="card">
            <div class="card-title">翰林学府上车必看</div>
            <div class="card-subtitle">请点击下方链接查阅相关文档：</div>
            <a href="https://docs.qq.com/doc/DQW5MVE9ZWUNhaHFV#" class="btn-primary" target="_blank">
                🛡️ [必读] 考前安全文档
            </a>
        </div>

        <!-- 翰林学府售后处理通道 -->
        <div class="card">
            <div class="card-title">翰林学府售后处理通道</div>
            <a href="https://docs.qq.com/doc/DQW5vYnRQd3BkVHFO#" class="btn-primary" target="_blank">
                🔧 翰林学府售后处理通道
            </a>
        </div>

        <!-- 翰林学府解题专员招募 -->
        <div class="card">
            <div class="card-title">翰林学府解题专员招募</div>
            <a href="https://docs.qq.com/doc/DQUxKTnFPREdNSG9G#" class="btn-primary" target="_blank">
                👨‍🏫 翰林学府解题专员招募
            </a>
        </div>

        <!-- 翰林学府客服服务评价 -->
        <div class="card">
            <div class="card-title">翰林学府客服服务评价</div>
            <a href="https://docs.qq.com/form/page/DQWdJTUZzdkdXWFJH" class="btn-primary" target="_blank">
                ⭐ 翰林学府客服服务评价
            </a>
        </div>

        <!-- 翰林学府考试官方预约通道 -->
        <div class="card">
            <div class="card-title">翰林学府考试官方预约通道</div>
            <a href="https://docs.qq.com/form/page/DQUFISG9mbU5WWVhL" class="btn-primary" target="_blank">
                📝 翰林学府考试官方预约通道
            </a>
        </div>

        <!-- 页脚 -->
        <div class="footer">
            &copy; 2026  翰林学府 首发品牌
        </div>
    </div>
</body>
</html>
